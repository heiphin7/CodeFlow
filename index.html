<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-section">
                <img src="https://cdn-icons-png.flaticon.com/512/7560/7560719.png" class="logo-img">
                <div class="projectname">CodeFlow</div>
            </div>
            <div class="user-info">
                <div class="username">username</div>
            </div>
        </header>
        
        <main class="main-content">
            <section class="problems">
                <h1>Problems</h1>
                <div class="categories">
                    <button>Array</button>
                    <button>String</button>
                    <button>Sorting</button>
                    <button>Dynamic Programming</button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Title</th>
                            <th>Difficulty</th>
                            <th>Solved</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>✔️</td>
                            <td>Two Sum</td>
                            <td>Easy</td>
                            <td>x1 users</td>
                        </tr>
                        <!-- Additional rows omitted for brevity -->
                    </tbody>
                </table>
            </section>

            <aside class="sidebar-right">
            </aside>

        </main>
    </div>
</body>
</html>
